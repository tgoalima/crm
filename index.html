<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Propostas Comerciais - Suprimática</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            heading: ['Outfit', 'sans-serif'],
          },
          colors: {
            slate: {
              950: '#030712',
            }
          }
        }
      }
    }
  </script>
  
  <!-- CSS customizado -->
  <link rel="stylesheet" href="styles.css">
  
  <!-- Supabase JS Client CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone CDN para compilar JSX no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="h-full bg-slate-950 text-slate-100 flex flex-col antialiased overflow-hidden">
  <!-- Root do App React -->
  <div id="root" class="flex-1 flex flex-col overflow-hidden">
    <!-- Loader inicial -->
    <div class="flex-1 flex flex-col items-center justify-center space-y-4">
      <div class="w-12 h-12 border-4 border-slate-800 border-t-indigo-500 rounded-full animate-spin"></div>
      <p class="text-slate-400 font-medium animate-pulse">Carregando interface do Gerador...</p>
    </div>
  </div>

  <!-- Script principal do App -->
  <script type="text/babel" data-type="module" src="app.js?v=1.2"></script>
</body>
</html>
